spring:
  application:
    name: ecommerce-project

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce_project_db?sslmode=disable
    username: ecommerce_user
    password: ecommerce_123

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-on-validation-error: true

server:
  port: 8080

api:
  security:
    token:
      secret: my-secret-key